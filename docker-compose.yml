version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      MYSQLHOST: db
      MYSQLPORT: 3306
      MYSQLDATABASE: sk_platform
      MYSQLUSER: sk_user
      MYSQLPASSWORD: sk_password
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sk_platform
      MYSQL_USER: sk_user
      MYSQL_PASSWORD: sk_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/sk_platform.sql:/docker-entrypoint-initdb.d/sk_platform.sql

volumes:
  db_data: